<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - 悦动宝 JoyMove'">悦动宝 JoyMove</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
    <th:block th:replace="${pageHead} ?: ~{}" />
</head>
<body>

<!-- ====== 导航栏 ====== -->
<nav class="navbar navbar-expand-lg navbar-joy sticky-top">
    <div class="container">
        <a class="navbar-brand" href="/">🏃 悦动宝 <small class="fw-light">JoyMove</small></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav ms-auto align-items-lg-center">
                <li class="nav-item"><a class="nav-link" href="/">🏠 首页</a></li>
                <li class="nav-item"><a class="nav-link" href="/projects">📋 运动项目</a></li>
                <li class="nav-item"><a class="nav-link" href="/plans">📅 运动计划</a></li>
                <li class="nav-item"><a class="nav-link" href="/medals">🏅 勋章馆</a></li>
                <span sec:authorize="hasRole('ADMIN')">
                    <li class="nav-item"><a class="nav-link fw-bold" href="/admin/activities">⚙️ 审核管理</a></li>
                </span>
                <span sec:authorize="isAuthenticated()">
                    <li class="nav-item"><a class="nav-link position-relative" href="/user/notifications">
                        🔔
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                              th:if="${unreadCount != null and unreadCount > 0}"
                              th:text="${unreadCount}" style="font-size:0.65rem;"></span>
                    </a></li>
                    <li class="nav-item"><a class="nav-link" href="/checkin">✅ 打卡</a></li>
                    <li class="nav-item"><a class="nav-link" href="/moment/publish">✍️ 记录运动</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">👤 我的</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/user/profile">个人中心</a></li>
                            <li><a class="dropdown-item" href="/my/medals">我的勋章</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="/logout">退出登录</a></li>
                        </ul>
                    </li>
                </span>
                <span sec:authorize="!isAuthenticated()">
                    <li class="nav-item"><a class="nav-link" href="/login">登录</a></li>
                    <li class="nav-item"><a class="btn btn-outline-joy btn-sm ms-2" href="/register">注册</a></li>
                </span>
            </ul>
        </div>
    </div>
</nav>

<!-- ====== 页面内容 ====== -->
<th:block th:replace="${pageContent} ?: ~{}" />

<!-- ====== 页脚 ====== -->
<footer class="text-center py-4 mt-5" style="background: var(--joy-dark); color: rgba(255,255,255,0.7);">
    <div class="container">
        <p class="mb-1">🏃 悦动宝 JoyMove — 让运动成为家庭最温暖的陪伴</p>
        <small>© 2026 JoyMove. 亲子运动陪伴平台.</small>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<th:block th:replace="${pageScripts} ?: ~{}" />
</body>
</html>
