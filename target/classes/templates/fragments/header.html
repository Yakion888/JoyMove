                <li class="nav-item"><a class="nav-link" href="/projects" style="font-size:1rem;padding:4px 12px;font-weight:600;">📋 项目</a></li>
                <li class="nav-item"><a class="nav-link" href="/plans" style="font-size:1rem;padding:4px 12px;font-weight:600;">📅 计划</a></li>
                <li class="nav-item"><a class="nav-link" href="/medals" style="font-size:1rem;padding:4px 12px;font-weight:600;">🏅 勋章</a></li>
                <li class="nav-item"><a class="nav-link" href="/community" style="font-size:1rem;padding:4px 12px;font-weight:600;">💬 社区</a></li>
                <li class="nav-item"><a class="nav-link" href="/dashboard" style="font-size:1rem;padding:4px 12px;font-weight:600;">📊 看板</a></li>
                <li class="nav-item"><a class="nav-link fw-bold" href="/checkin" style="font-size:1rem;padding:4px 12px;">✅ 打卡</a></li>
            </ul>

            <!-- 右侧：横行 -->
            <span sec:authorize="hasRole('ADMIN')">
                <a class="nav-link d-inline" href="/admin/activities" style="font-size:1rem;">⚙️</a>
            </span>
            <span sec:authorize="isAuthenticated()">
                <a class="nav-link d-inline position-relative" href="/user/notifications" style="font-size:1rem;">🔔 通知
                    <span class="position-absolute translate-middle badge rounded-pill bg-danger"
                        th:if="${unreadCount != null and unreadCount > 0}"

                </a>
                <span class="nav-item dropdown d-inline">
                    <a class="nav-link dropdown-toggle d-inline" href="#" data-bs-toggle="dropdown" style="font-size:1rem;">👤 我的</a>

                    </ul>

            </span>
            <span sec:authorize="!isAuthenticated()">
                <a class="nav-link d-inline" href="/login" style="font-size:1rem;">登录</a>

</nav>
<script>
(function(){
    var nav=document.querySelector('.navbar-joy');
    if(!nav)return;
    var hero=document.querySelector('.joy-hero');
    if(hero){window.addEventListener('scroll',function(){nav.classList.toggle('scrolled',window.scrollY>hero.offsetHeight-60);});}
    else{nav.classList.add('scrolled');}
})();
(function() {
    var path = location.pathname;
    document.querySelectorAll('.navbar-joy .nav-link').forEach(function(a) {
        var href = a.getAttribute('href');
        if (href && href !== '/' && href !== '#' && path === href) {
            a.style.fontWeight = '800';
            a.style.textDecoration = 'underline';
            a.style.textUnderlineOffset = '6px';
        }
    });
})();
</script>
