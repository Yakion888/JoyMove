<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${moment?.childName} + '的' + ${moment?.projectName} + ' - 悦动宝'">运动详情 - 悦动宝</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>
<body>

<div th:replace="fragments/header :: navbar"></div>

<div class="container mt-4" th:if="${moment != null}">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card joy-card">
                <!-- 照片 -->
                <img th:if="${moment.imageUrl != null}" th:src="${moment.imageUrl}"
                     class="card-img-top" style="max-height:400px; object-fit:cover;"
                     onerror="this.style.display='none'">

                <div class="card-body p-4">
                    <!-- 头部信息 -->
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div>
                            <span class="emoji-sm">
                                <span th:if="${moment.emotion == 1}">😄</span>
                                <span th:if="${moment.emotion == 2}">😊</span>
                                <span th:if="${moment.emotion == 3}">😐</span>
                                <span th:if="${moment.emotion == 4}">😓</span>
                            </span>
                            <span class="badge badge-joy ms-2" th:text="${moment.projectName}">项目名</span>
                        </div>
                        <div>
                            <span th:if="${moment.stars == 1}">⭐</span>
                            <span th:if="${moment.stars == 2}">⭐⭐</span>
                            <span th:if="${moment.stars == 3}">⭐⭐⭐</span>
                            <span th:if="${moment.stars == 4}">⭐⭐⭐⭐</span>
                            <span th:if="${moment.stars == 5}">⭐⭐⭐⭐⭐</span>
                        </div>
                    </div>

                    <!-- 元信息 -->
                    <div class="row mb-3 text-muted small">
                        <div class="col-6">👤 <span th:text="${moment.authorNickname}">作者</span></div>
                        <div class="col-6" th:if="${moment.childName != null}">👶 <span th:text="${moment.childName}">孩子</span>
                            <span th:if="${moment.childAgeAtMoment != null}">(<span th:text="${moment.childAgeAtMoment}"></span>岁)</span>
                        </div>
                        <div class="col-6" th:if="${moment.duration != null}">⏱️ <span th:text="${moment.duration}"></span> 分钟</div>
                        <div class="col-6" th:if="${moment.location != null}">📍 <span th:text="${moment.location}"></span></div>
                        <div class="col-6">📅 <span th:text="${moment.recordDate}"></span></div>
                        <div class="col-6" th:if="${moment.stars != null}">⭐ 自评 <span th:text="${moment.stars}"></span> 星</div>
                    </div>

                    <!-- 内容 -->
                    <div class="mb-3" style="white-space:pre-wrap;" th:text="${moment.content}">内容...</div>

                    <!-- 点赞 -->
                    <div class="d-flex gap-2 mb-4">
                        <button class="btn btn-sm btn-joy-outline" id="likeBtn"
                                th:attr="data-id=${moment.id}">
                            ❤️ <span th:text="${moment.likeCount}">0</span> 赞
                        </button>
                        <span class="text-muted small align-self-center">
                            💬 <span th:text="${moment.commentCount}">0</span> 条互动
                        </span>
                    </div>

                    <!-- 互动区 -->
                    <h6 class="fw-bold mb-3">💬 社区互动</h6>
                    <div th:if="${interactions != null and !interactions.isEmpty()}">
                        <div class="mb-2" th:each="it : ${interactions}"
                             th:style="'margin-left:' + ${it.depth * 20} + 'px'">
                            <div class="border-start border-3 ps-2 mb-2" style="border-color:var(--joy-primary)!important;">
                                <strong th:text="${it.nickname}">昵称</strong>
                                <span class="text-muted small" th:text="${#temporals.format(it.createTime, 'MM-dd HH:mm')}"></span>
                                <div th:text="${it.content}">内容</div>
                            </div>
                        </div>
                    </div>
                    <div th:unless="${interactions != null and !interactions.isEmpty()}" class="text-muted small mb-3">
                        还没有互动，来第一个评论吧～
                    </div>

                    <!-- 发布互动 -->
                    <form id="interactionForm" class="mt-3" sec:authorize="isAuthenticated()">
                        <input type="hidden" id="momentId" th:value="${moment.id}">
                        <textarea class="form-control mb-2" id="interactionContent" rows="2"
                                  placeholder="写下你的评论或鼓励..."></textarea>
                        <button type="submit" class="btn btn-joy btn-sm">发布</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container text-center py-5" th:unless="${moment != null}">
    <div class="emoji-lg">📭</div>
    <h5>记录不存在</h5>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script th:inline="javascript">
// Like
$('#likeBtn').click(function() {
    var btn = $(this);
    $.post('/api/moment/like', { momentId: btn.data('id') }, function(res) {
        if (res.code === 200) {
            var count = parseInt(btn.text().match(/\d+/)[0]) || 0;
            var isLiked = res.data === '已点赞';
            count = isLiked ? count + 1 : Math.max(0, count - 1);
            btn.text((isLiked ? '❤️ ' : '🤍 ') + count + ' 赞');
        }
    });
});

// Interaction
$('#interactionForm').on('submit', function(e) {
    e.preventDefault();
    var content = $('#interactionContent').val().trim();
    if (!content) return;
    $.post('/api/interaction/save', {
        momentId: $('#momentId').val(),
        content: content
    }, function(res) {
        if (res.code === 200) location.reload();
    });
});
</script>
</body>
</html>
