<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通知 - 悦动宝 JoyMove</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>
<body>

<div th:replace="fragments/header :: navbar"></div>

<div class="container mt-4">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="fw-bold mb-0">🔔 通知</h4>
                <button class="btn btn-sm btn-joy-outline" id="markAllBtn" th:if="${unreadCount != null and unreadCount > 0}">
                    全部标为已读
                </button>
            </div>

            <div th:if="${notifications != null and !notifications.isEmpty()}">
                <div class="card joy-card mb-2" th:each="n : ${notifications}"
                     th:classappend="${n.isRead == 0} ? 'border-start border-3 border-warning' : ''">
                    <div class="card-body py-2 px-3">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <span class="emoji-sm">
                                    <span th:if="${n.type == 1}">📝</span>
                                    <span th:if="${n.type == 2}">🏅</span>
                                    <span th:if="${n.type == 3}">⏰</span>
                                    <span th:if="${n.type == 4}">💬</span>
                                </span>
                                <span th:text="${n.message}">消息内容</span>
                            </div>
                            <small class="text-muted" th:text="${#temporals.format(n.createTime, 'MM-dd HH:mm')}">时间</small>
                        </div>
                        <a th:if="${n.type == 1 and n.relatedId != null}" th:href="@{'/moment/' + ${n.relatedId}}"
                           class="small" style="color:var(--joy-accent);">查看详情 →</a>
                    </div>
                </div>

                <nav th:if="${totalPages != null and totalPages > 1}">
                    <ul class="pagination justify-content-center mt-3">
                        <li class="page-item" th:classappend="${currentPage <= 1} ? 'disabled' : ''">
                            <a class="page-link" th:href="@{/user/notifications(page=${currentPage-1})}">上一页</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
                            th:classappend="${i == currentPage} ? 'active' : ''">
                            <a class="page-link" th:href="@{/user/notifications(page=${i})}" th:text="${i}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage >= totalPages} ? 'disabled' : ''">
                            <a class="page-link" th:href="@{/user/notifications(page=${currentPage+1})}">下一页</a>
                        </li>
                    </ul>
                </nav>
            </div>

            <div th:unless="${notifications != null and !notifications.isEmpty()}" class="text-center py-5 text-muted">
                <div class="emoji-lg mb-2">🔔</div>
                <h5>暂无通知</h5>
                <p>当你获得勋章或收到互动时，会在这里收到通知</p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script th:inline="javascript">
$('#markAllBtn').click(function() {
    $.post('/user/notifications/read-all', function(res) {
        if (res.code === 200) location.reload();
    });
});
</script>
</body>
</html>
