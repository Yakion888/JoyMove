<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>勋章馆 - 悦动宝 JoyMove</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>
<body>

<div th:replace="fragments/header :: navbar"></div>

<div class="container mt-4">
    <h4 class="fw-bold mb-1">🏅 勋章馆</h4>
    <p class="text-muted mb-3">每一次运动都值得被纪念</p>

    <!-- 统计条 -->
    <div class="row text-center mb-4" id="statsRow" style="display:none;">
        <div class="col-3"><div class="stat-number" id="earnedCount">0</div><div class="stat-label">已获勋章</div></div>
        <div class="col-3"><div class="stat-number" id="totalCount">10</div><div class="stat-label">全部勋章</div></div>
        <div class="col-3"><div class="stat-number" id="totalActivities2">0</div><div class="stat-label">累计运动</div></div>
        <div class="col-3"><div class="stat-number" id="varietyCount">0</div><div class="stat-label">运动种类</div></div>
    </div>

    <!-- 勋章网格 -->
    <div class="row" id="medalGrid"></div>

    <!-- 未登录提示 -->
    <div id="loginHint" class="text-center py-5" style="display:none;">
        <p class="text-muted">登录后查看你的勋章进度</p>
        <a href="/login" class="btn btn-joy">去登录</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script th:inline="javascript">
$.get('/api/medals/progress', function(res) {
    if (res.code !== 200) {
        $('#loginHint').show();
        return;
    }
    var medals = res.data || [];
    $('#statsRow').show();
    var earned = medals.filter(function(m) { return m.earned; }).length;
    $('#earnedCount').text(earned);

    var html = '';
    medals.forEach(function(m) {
        var earnedClass = m.earned ? '' : 'opacity-50';
        var badgeHtml = m.earned ? '<span class="badge bg-success">✅ 已获得</span>' :
            '<div class="progress" style="height:6px;"><div class="progress-bar bg-warning" style="width:' +
            m.progressPercent + '%"></div></div><small class="text-muted">' + m.currentProgress + '/' + m.conditionValue + '</small>';

        html += '<div class="col-md-4 col-sm-6 mb-3"><div class="card joy-card h-100 ' + earnedClass + '">' +
            '<div class="card-body text-center p-3">' +
            '<div class="emoji-lg mb-2">' + (m.medalIcon || '🏅') + '</div>' +
            '<h6 class="fw-bold">' + m.medalName + '</h6>' +
            '<small class="text-muted d-block mb-2">' + (m.triggerCondition || '') + '</small>' +
            badgeHtml +
            '</div></div></div>';
    });
    $('#medalGrid').html(html);
});
</script>
</body>
</html>
