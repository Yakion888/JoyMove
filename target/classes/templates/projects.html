<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运动项目库 - 悦动宝 JoyMove</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>
<body>

<div th:replace="fragments/header :: navbar"></div>

<div class="container mt-4">
    <h4 class="fw-bold mb-1">📋 运动项目库</h4>
    <p class="text-muted mb-3">选择一个项目，开始今天的亲子运动吧</p>

    <!-- AI 推荐区 -->
    <div class="card joy-card mb-3" id="aiSection" style="background: linear-gradient(135deg, #FFF3E0, #FFE0B2);">
        <div class="card-body p-3">
            <div class="d-flex align-items-center gap-3">
                <span class="emoji-lg">🤖</span>
                <div class="flex-grow-1">
                    <h6 class="fw-bold mb-1">AI 为你推荐</h6>
                    <p class="small text-muted mb-2">根据孩子年龄和天气，智能推荐最适合的运动</p>
                    <div class="d-flex gap-2" id="aiSelector">
                        <select class="form-select form-select-sm" id="aiChildId" style="max-width:150px;">
                            <option value="">选择孩子</option>
                        </select>
                        <input type="text" class="form-control form-control-sm" id="aiWeather" placeholder="天气(如:晴天28°C)" style="max-width:150px;" value="晴天">
                        <button class="btn btn-joy btn-sm" onclick="aiRecommend()">✨ 智能推荐</button>
                    </div>
                </div>
            </div>
            <div class="row mt-3" id="aiResult"></div>
        </div>
    </div>

    <!-- 筛选 -->
    <div class="d-flex flex-wrap gap-2 mb-4">
        <button class="btn btn-sm btn-joy age-filter active" data-age="all">全部年龄</button>
        <button class="btn btn-sm btn-joy-outline age-filter" data-age="3,5">3-5岁</button>
        <button class="btn btn-sm btn-joy-outline age-filter" data-age="6,8">6-8岁</button>
        <button class="btn btn-sm btn-joy-outline age-filter" data-age="9,11">9-11岁</button>
        <button class="btn btn-sm btn-joy-outline age-filter" data-age="12,14">12-14岁</button>
        <span class="mx-2 border-end"></span>
        <button class="btn btn-sm btn-joy-outline type-filter active" data-type="all">全部类型</button>
        <button class="btn btn-sm btn-joy-outline type-filter" data-type="1">🌳 户外</button>
        <button class="btn btn-sm btn-joy-outline type-filter" data-type="2">🏠 室内</button>
        <button class="btn btn-sm btn-joy-outline type-filter" data-type="3">🌳🏠 皆可</button>
    </div>

    <!-- 项目列表 -->
    <div class="row" id="projectList"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script th:inline="javascript">
var allProjects = [];
var ageFilter = 'all', typeFilter = 'all';

// 加载孩子列表到 AI 推荐区
$.get('/api/user/children', function(res) {
    if (res.code === 200 && res.data) {
        var opts = '<option value="">选择孩子</option>';
        res.data.forEach(function(c) {
            opts += '<option value="' + c.id + '">' + c.name + ' (' + (c.gender === 0 ? '男' : '女') + ')</option>';
        });
        $('#aiChildId').html(opts);
    }
});

// 从后端加载项目数据
$.get('/api/projects', function(res) {
    if (res.code === 200 && res.data) {
        allProjects = res.data;
        render();
    }
});

function render() {
    var filtered = allProjects.filter(function(p) {
        if (ageFilter !== 'all') {
            var parts = ageFilter.split(',');
            if (p.ageRangeMin > parseInt(parts[1]) || p.ageRangeMax < parseInt(parts[0])) return false;
        }
        if (typeFilter !== 'all' && p.activityType != typeFilter) return false;
        return true;
    });

    var seasonMap = {1:'🌸春',2:'☀️夏',3:'🍂秋',4:'❄️冬',5:'全年'};
    var typeMap = {1:'🌳户外',2:'🏠室内',3:'🌳🏠皆可'};
    var diffMap = {1:'⭐',2:'⭐⭐',3:'⭐⭐⭐',4:'⭐⭐⭐⭐',5:'⭐⭐⭐⭐⭐'};

    var html = '';
    filtered.forEach(function(p) {
        html += '<div class="col-md-4 col-sm-6 mb-3">' +
            '<div class="card joy-card h-100" style="cursor:pointer;" onclick="startMoment(' + p.id + ')">' +
            '<div class="card-body">' +
            '<div class="d-flex justify-content-between align-items-start mb-2">' +
            '<h6 class="fw-bold mb-0">' + (p.name || '') + '</h6>' +
            '<span class="badge badge-joy">' + (diffMap[p.difficultyLevel] || '⭐') + '</span>' +
            '</div>' +
            '<p class="text-muted small mb-2">' + (p.description || '').substring(0, 80) + '...</p>' +
            '<div class="d-flex flex-wrap gap-1 mb-2">' +
            '<small class="text-muted">👶 ' + p.ageRangeMin + '-' + p.ageRangeMax + '岁</small>' +
            '<small class="text-muted">· ⏱️ ' + p.durationMin + '-' + p.durationMax + 'min</small>' +
            '<small class="text-muted">· ' + (typeMap[p.activityType] || '') + '</small>' +
            '</div>' +
            '<div class="d-flex flex-wrap gap-1 mb-2">';
        if (p.abilityTags) {
            p.abilityTags.split(',').forEach(function(t) {
                html += '<span class="badge bg-light text-dark">' + t.trim() + '</span>';
            });
        }
        html += '</div>' +
            '<div class="d-flex justify-content-between align-items-center">' +
            '<small class="text-muted">🛠️ ' + (p.equipment || '无') + '</small>' +
            '<small class="text-muted">' + (seasonMap[p.seasonRecommend] || '') + '</small>' +
            '</div>' +
            '<button class="btn btn-joy btn-sm w-100 mt-2" onclick="event.stopPropagation();startMoment(' + p.id + ')">' +
            '🚀 开始运动</button>' +
            '</div></div></div>';
    });

    if (filtered.length === 0) {
        html = '<div class="col-12 text-center py-5 text-muted"><p>没有匹配的运动项目</p></div>';
    }
    $('#projectList').html(html);
}

// 筛选按钮
$('.age-filter').click(function() {
    $('.age-filter').removeClass('active btn-joy').addClass('btn-joy-outline');
    $(this).addClass('active btn-joy').removeClass('btn-joy-outline');
    ageFilter = $(this).data('age') + '';
    render();
});
$('.type-filter').click(function() {
    $('.type-filter').removeClass('active btn-joy').addClass('btn-joy-outline');
    $(this).addClass('active btn-joy').removeClass('btn-joy-outline');
    typeFilter = $(this).data('type') + '';
    render();
});

// 跳转打卡页（预填项目）
function startMoment(projectId) {
    window.location.href = '/guide?projectId=' + projectId;
}

function aiRecommend() {
    var childId = $('#aiChildId').val();
    if (!childId) return alert('请先选择孩子');
    $('#aiResult').html('<div class="col-12 text-center py-3"><div class="spinner-border text-warning"></div><p>AI 分析中...</p></div>');
    $.get('/api/ai/recommend', { childId: childId, weather: $('#aiWeather').val() || '晴天', count: 3 }, function(res) {
        if (res.code !== 200) { $('#aiResult').html('<p class="text-danger">推荐失败</p>'); return; }
        var html = '';
        (res.data || []).forEach(function(r) {
            html += '<div class="col-md-4 mb-2"><div class="card border-warning h-100"><div class="card-body p-2">' +
                '<strong>' + (r.projectName || '') + '</strong> <small class="text-muted">' + (r.ageRange || '') + '</small>' +
                '<p class="small mb-1">💡 ' + (r.reason || '') + '</p>' +
                '<small>' + (r.duration || '') + ' | ' + (r.equipment || '无') + '</small>' +
                '<button class="btn btn-joy btn-sm w-100 mt-1" onclick="startMoment(' + r.projectId + ')">开始</button>' +
                '</div></div></div>';
        });
        $('#aiResult').html(html);
    });
}
</script>
</body>
</html>
