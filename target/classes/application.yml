# =============================================
# 悦动宝 JoyMove — 公共配置（所有环境共享）
# =============================================
# 环境切换：启动时指定 -Dspring.profiles.active=dev|prod
# 默认激活：dev

spring:
  profiles:
    active: dev

  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 10MB

  sql:
    init:
      mode: never

  thymeleaf:
    encoding: UTF-8
    mode: HTML
    prefix: classpath:/templates/
    suffix: .html

server:
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true

mybatis-plus:
  type-aliases-package: com.joymove.entity
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
    banner: false
  configuration:
    map-underscore-to-camel-case: true

app:
  upload:
    path: /uploads/
    max-size: 2097152
