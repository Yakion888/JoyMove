# =============================================
# Docker 环境配置
# =============================================
server:
  port: ${PORT:8080}

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:sports_blog}?useUnicode=true&characterEncoding=UTF-8&useSSL=true&requireSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&connectTimeout=20000&tlsVersions=TLSv1.2,TLSv1.3
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    hikari:
      initialization-fail-timeout: 20000
      maximum-pool-size: 3
      minimum-idle: 0
      connection-timeout: 20000

  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}

  thymeleaf:
    cache: true

  devtools:
    restart:
      enabled: false

  sql:
    init:
      mode: never

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

logging:
  level:
    root: info
    com.joymove: debug
    com.zaxxer.hikari: trace
    org.springframework.boot: info
  pattern:
    console: "%d{HH:mm:ss} %-5level [%thread] %logger{0} - %msg%n"

deepseek:
  api:
    key: ${DEEPSEEK_API_KEY:sk-demo}
    url: https://api.deepseek.com/v1/chat/completions
