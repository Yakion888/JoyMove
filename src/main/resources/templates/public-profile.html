<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${profileUser.nickname} + ' 的主页 - 悦动宝'">用户主页</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/header :: navbar"></div>

<div class="container mt-4">
    <!-- 用户信息卡片 -->
    <div class="card joy-card mb-4">
        <div class="card-body text-center p-4">
            <img th:src="${profileUser.avatar} ?: '/images/default-avatar.png'"
                 class="rounded-circle mb-3" width="80" height="80" alt="头像">
            <h5 th:text="${profileUser.nickname}">用户昵称</h5>
            <p class="text-muted" th:if="${profileUser.city}" th:text="'📍 ' + ${profileUser.city}"></p>
            <p class="text-muted small" th:if="${profileUser.bio}" th:text="${profileUser.bio}"></p>
        </div>
    </div>

    <!-- 统计 KPI -->
    <div class="row mb-4 text-center" id="statsRow">
        <div class="col-3"><div class="fw-bold" id="statDays">-</div><small class="text-muted">运动天数</small></div>
        <div class="col-3"><div class="fw-bold" id="statMoments">-</div><small class="text-muted">运动次数</small></div>
        <div class="col-3"><div class="fw-bold" id="statMedals">-</div><small class="text-muted">勋章数</small></div>
        <div class="col-3"><div class="fw-bold" id="statStreak">-</div><small class="text-muted">最长连续</small></div>
    </div>

    <!-- 勋章 -->
    <div class="card joy-card mb-4">
        <div class="card-body">
            <h6 class="fw-bold">🏅 已获勋章</h6>
            <div id="medalIcons" class="d-flex flex-wrap gap-2"></div>
        </div>
    </div>

    <!-- 最近动态 -->
    <div class="card joy-card">
        <div class="card-body">
            <h6 class="fw-bold">📋 最近运动记录</h6>
            <div id="momentList"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script th:inline="javascript">
    var userId = [[${profileUser.id}]];

    // 加载统计数据（走 Redis 缓存）
    $.get('/api/user/' + userId + '/stats', function(res) {
        if (res.code !== 200) return;
        var d = res.data;
        $('#statDays').text(d.totalDays || 0);
        $('#statMoments').text(d.totalMoments || 0);
        $('#statMedals').text(d.medalCount || 0);
        $('#statStreak').text(d.longestStreak || 0);

        var icons = (d.medalIcons || []).map(function(icon) {
            return '<span class="fs-4">' + (icon || '🏅') + '</span>';
        }).join('');
        $('#medalIcons').html(icons || '<span class="text-muted">暂无勋章</span>');
    });

    // 加载最近动态（分页）
    $.get('/api/user/' + userId + '/moments', { page: 1, size: 10 }, function(res) {
        if (res.code !== 200) return;
        var records = (res.data || {}).records || [];
        var html = '';
        records.forEach(function(m) {
            html += '<div class="border-bottom py-2">' +
                '<div class="d-flex justify-content-between">' +
                '<strong>' + (m.projectName || '运动') + '</strong>' +
                '<small class="text-muted">' + (m.recordDate || '') + '</small>' +
                '</div>' +
                (m.content ? '<p class="mb-1 small text-muted">' + m.content.substring(0, 80) + '</p>' : '') +
                '<small>⭐'.repeat(m.stars || 0) + '</small>' +
                '</div>';
        });
        $('#momentList').html(html || '<p class="text-muted">还没有公开的运动记录</p>');
    });
</script>
</body>
</html>
