<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运动计划 - 悦动宝 JoyMove</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>
<body>

<div th:replace="fragments/header :: navbar"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h4 class="fw-bold mb-0">📅 我的运动计划</h4>
            <p class="text-muted small mb-0">提前规划，让运动成为习惯</p>
        </div>
        <button class="btn btn-joy" data-bs-toggle="modal" data-bs-target="#addPlanModal">+ 添加计划</button>
    </div>

    <!-- 待执行 -->
    <h6 class="fw-bold mb-2">⏳ 待执行</h6>
    <div id="pendingPlans" class="mb-3"></div>

    <!-- 已完成 -->
    <h6 class="fw-bold mb-2 mt-4">✅ 已完成</h6>
    <div id="donePlans" class="mb-3"></div>

    <!-- 已跳过 -->
    <h6 class="fw-bold mb-2 mt-4">⏭️ 已跳过</h6>
    <div id="skippedPlans" class="mb-3"></div>
</div>

<!-- 添加计划 Modal -->
<div class="modal fade" id="addPlanModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">📅 添加运动计划</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label fw-bold">🏃 运动项目</label>
                    <select class="form-select" id="planProjectId"></select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">📅 计划日期</label>
                    <input type="date" class="form-control" id="planDate">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-joy" id="savePlanBtn">保存</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script th:inline="javascript">
var projects = [];
var plans = [];

// 加载项目列表
$.get('/api/projects', function(res) {
    if (res.code === 200) {
        projects = res.data;
        var opts = '<option value="">选择项目</option>';
        projects.forEach(function(p) { opts += '<option value="' + p.id + '">' + p.name + '</option>'; });
        $('#planProjectId').html(opts);
    }
});

// 加载计划列表
function loadPlans() {
    $.get('/api/plan/calendar', { startDate: '2026-01-01', endDate: '2026-12-31' }, function(res) {
        if (res.code === 200) {
            plans = res.data || [];
            renderPlans();
        }
    });
}

function renderPlans() {
    var pendingHtml = '', doneHtml = '', skippedHtml = '';
    var statusMap = {0:'⏳', 1:'✅', 2:'⏭️'};

    plans.forEach(function(p) {
        var proj = projects.find(function(pr) { return pr.id == p.projectId; });
        var projName = proj ? proj.name : '未知项目';
        var card = '<div class="card joy-card mb-2"><div class="card-body py-2 px-3">' +
            '<div class="d-flex justify-content-between align-items-center">' +
            '<div>' +
            '<strong>' + p.plannedDate + '</strong> ' +
            '<span class="badge badge-joy">' + projName + '</span>' +
            (p.actualDuration ? ' · ⏱️' + p.actualDuration + 'min' : '') +
            (p.childFeedback ? ' · 💬' + p.childFeedback : '') +
            '</div>' +
            '<div class="btn-group btn-group-sm">';
        if (p.status === 0) {
            card += '<button class="btn btn-success btn-sm" onclick="completePlan(' + p.id + ')">✅ 完成</button>' +
                    '<button class="btn btn-outline-secondary btn-sm" onclick="skipPlan(' + p.id + ')">⏭️ 跳过</button>';
        }
        card += '</div></div></div></div>';

        if (p.status === 0) pendingHtml += card;
        else if (p.status === 1) doneHtml += card;
        else skippedHtml += card;
    });

    $('#pendingPlans').html(pendingHtml || '<p class="text-muted small">暂无待执行计划</p>');
    $('#donePlans').html(doneHtml || '<p class="text-muted small">暂无已完成计划</p>');
    $('#skippedPlans').html(skippedHtml || '<p class="text-muted small">暂无跳过计划</p>');
}

// 保存计划
$('#savePlanBtn').click(function() {
    var projectId = $('#planProjectId').val();
    var plannedDate = $('#planDate').val();
    if (!projectId || !plannedDate) return alert('请选择项目和日期');

    // 检查日期是否已过
    if (plannedDate && plannedDate < new Date().toISOString().split('T')[0]) {
        if (!confirm('选择的日期已过，确定要设置计划吗？')) return;
    }

    $.post('/api/plan/create', { projectId: projectId, plannedDate: plannedDate }, function(res) {
        if (res.code === 200) {
            $('#addPlanModal').modal('hide');
            loadPlans();
        }
    });
});

function completePlan(id) {
    var feedback = prompt('孩子反馈（选填）：');
    $.post('/api/plan/complete', { planId: id, childFeedback: feedback }, function(res) {
        if (res.code === 200) loadPlans();
    });
}

function skipPlan(id) {
    if (confirm('确定跳过这个计划？')) {
        $.post('/api/plan/skip', { planId: id }, function(res) {
            if (res.code === 200) loadPlans();
        });
    }
}

// 默认日期设为今天
$('#planDate').val(new Date().toISOString().split('T')[0]);
loadPlans();
</script>
</body>
</html>
