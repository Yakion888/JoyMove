<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 悦动宝 JoyMove</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
    <style>
        .auth-brand { font-size: 3rem; }
    </style>
</head>
<body class="joy-auth-bg">

<div class="container">
    <div class="card joy-auth-card">
        <div class="card-body text-center">
            <div class="auth-brand mb-2">🏃</div>
            <h3 class="fw-bold mb-1">欢迎回到悦动宝</h3>
            <p class="text-muted mb-4">继续亲子运动之旅</p>

            <!-- 注册成功提示 -->
            <div th:if="${param.registered}" class="alert alert-success py-2" role="alert">
                ✅ 注册成功，请登录
            </div>
            <!-- 登录失败 -->
            <div th:if="${param.error}" class="alert alert-danger py-2" role="alert">
                用户名或密码错误
            </div>
            <!-- 登出 -->
            <div th:if="${param.logout}" class="alert alert-info py-2" role="alert">
                您已退出登录
            </div>

            <form th:action="@{/doLogin}" method="post" class="text-start">
                <div class="mb-3">
                    <label for="username" class="form-label fw-bold">用户名</label>
                    <input type="text" class="form-control form-control-lg" id="username"
                           name="username" placeholder="请输入用户名" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label fw-bold">密码</label>
                    <input type="password" class="form-control form-control-lg" id="password"
                           name="password" placeholder="请输入密码" required>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-joy btn-lg">登 录</button>
                </div>
                <div class="text-center mt-3">
                    <span class="text-muted">还没有账户？</span>
                    <a href="/register" class="fw-bold" style="color:var(--joy-accent);">立即注册</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
