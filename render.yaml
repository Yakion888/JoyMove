services:
  - type: web
    name: joymove
    env: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        value: sports_blog
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: REDIS_HOST
        value: ""
      - key: REDIS_PORT
        value: "6379"
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: SPRING_PROFILES_ACTIVE
        value: docker,render
